  <!-- ══════════════════════════════════════════════
       SERVICE WORKER + ERROR RECOVERY
  ══════════════════════════════════════════════ -->
  <script>
    // Global error handler to catch asset loading failures on new deploys
    window.addEventListener('error', (event) => {
      const isAssetError = event.target && (event.target.tagName === 'LINK' || event.target.tagName === 'SCRIPT');
      const src = event.target.src || event.target.href || '';
      const isHashedAsset = src.includes('/assets/index-');
      if (isAssetError && isHashedAsset) {
        console.warn('Stale asset detected, reloading:', src);
        // Attempt a hard reload once to pick up new deploy
        if (!sessionStorage.getItem('reloaded_once')) {
          sessionStorage.setItem('reloaded_once', '1');
          window.location.reload(true);
        }
      }
    }, true);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            registration.update();
          })
          .catch(() => {
            // Silently fail  -  app still works without SW
          });
      });
    }
  </script>
